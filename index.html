<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>REDACTOR</title>
<link rel="stylesheet" href="styles.css">
</head>

<body class="font-inter">

<div class="app">

  <!-- SIDEBAR -->
  <aside id="sidebar" class="sidebar">

    <div class="brand">REDACTOR</div>

    <div class="block">
      <label>TYPE</label>
      <div id="typeChoices" class="chips"></div>
    </div>

    <div class="block">
      <label>MODE</label>
      <div id="modeChoices" class="chips"></div>
    </div>

    <div class="block">
      <label>SYMPTÔMES</label>
      <div id="symptomChoices" class="chips"></div>
    </div>

    <div class="block">
      <label>PLAN</label>
      <div id="planChoices" class="chips"></div>
    </div>

    <div class="block">
      <label>MODULES</label>
      <div class="chips">
        <span onclick="openModal('alcool')">alcool</span>
        <span onclick="openModal('mse')">examen</span>
        <span onclick="openModal('todo')">todo</span>
      </div>
    </div>

  </aside>

  <!-- MAIN -->
  <main class="main">

    <div class="topbar">
      <button onclick="toggleSidebar()">☰</button>

      <div class="actions">
        <button onclick="generateText()">texte</button>
        <button onclick="generateQuestionnaire()">questionnaire</button>
        <button onclick="generateTodo()">todo</button>
      </div>
    </div>
